name: Deploy to GitHub Pages

on:
  push:
    branches: 
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build Hugo site
        run: hugo --minify

      - name: Deploy to external repository
        uses: peaceiris/actions-gh-pages@v4
        with:
          external_repository: k40tik/k40tik.github.io
          deploy_key: ${{ secrets.DEPLOY_KEY }}
          publish_branch: main
          publish_dir: ./public
          commit_message: "Auto-deploy Hugo build"
