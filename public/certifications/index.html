  .cert-grid {
    display: grid;

    transform-style: preserve-3d;

  }

  .cert-face {
    position: absolute;
    inset: 0;
    border-radius: 12px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(255, 255, 255, 0.1);
    overflow: hidden;
  }

  .cert-front {

  .cert-front h3 {
    margin: 0;
    font-size: 1.35rem;
    font-weight: 700;
    line-height: 1.4;
  }

  .cert-hint {
    position: absolute;
    bottom: 1rem;
    font-size: 0.75rem;
    opacity: 0.4;
  }

  .cert-back {
    transform: rotateY(180deg);
    background: rgba(0, 0, 0, 0.1);
  }

  .cert-back img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    padding: 0.5rem;
  }
</style>
